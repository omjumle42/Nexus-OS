<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>365-Day Neon Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Neon-Black UI Palette */
            --bg-color: #000000;
            --surface-color: #080808;
            --surface-border: #1a1a1a;
            
            --neon-cyan: #00FFFF;
            --neon-red: #FF003C;
            --neon-green: #00FF00;
            
            --text-main: #FFFFFF;
            --text-muted: #666666;
            
            --font-display: 'Orbitron', sans-serif;
            --font-body: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }

        .app-layout {
            display: flex;
            gap: 2rem;
            width: 100%;
            max-width: 1400px;
            height: calc(100vh - 4rem);
        }

        /* Utility */
        .neon-box {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: border-color 0.3s;
        }

        .neon-box:hover {
            border-color: rgba(0, 255, 255, 0.2);
        }

        .neon-text-cyan {
            color: var(--neon-cyan);
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }
        
        .neon-text-red {
            color: var(--neon-red);
            text-shadow: 0 0 8px rgba(255, 0, 60, 0.5);
        }

        .neon-text-green {
            color: var(--neon-green);
            text-shadow: 0 0 8px rgba(0, 255, 0, 0.5);
        }

        h2, h3 {
            font-family: var(--font-display);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Sidebar & Calendar */
        .sidebar {
            width: 320px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .btn-icon {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            width: 30px;
            height: 30px;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-display);
            transition: all 0.2s;
            box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.2);
        }

        .btn-icon:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.4), 0 0 10px rgba(0, 255, 255, 0.2);
        }

        .calendar-grid-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-family: var(--font-display);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.4rem;
        }

        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid var(--surface-border);
            color: var(--text-muted);
        }

        .calendar-day:hover {
            border-color: var(--neon-cyan);
            color: var(--text-main);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        .calendar-day.empty {
            cursor: default;
            border-color: transparent;
        }

        .calendar-day.empty:hover {
            box-shadow: none;
        }

        .calendar-day.today:not(.selected) {
            border-color: var(--neon-green);
            color: var(--text-main);
        }

        .calendar-day.selected {
            background: rgba(0, 255, 255, 0.15);
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
            box-shadow: inset 0 0 8px rgba(0, 255, 255, 0.3);
        }

        .btn-block {
            width: 100%;
            padding: 0.8rem;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: var(--font-display);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-block:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
        }

        /* Main Dashboard */
        .dashboard {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            grid-template-rows: auto 1fr;
            gap: 2rem;
            overflow-y: hidden;
        }

        .dashboard-header {
            grid-column: 1 / 3;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--surface-border);
        }

        .dashboard-header h1 {
            font-family: var(--font-display);
            font-size: 2rem;
        }

        /* Tasks Section */
        .tasks-section {
            grid-column: 1 / 2;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow: hidden;
        }

        .task-input-wrapper {
            display: flex;
            gap: 1rem;
        }

        .task-input {
            flex-grow: 1;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            color: var(--text-main);
            padding: 1rem;
            border-radius: 4px;
            font-family: var(--font-body);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .task-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.2);
        }

        .btn-add {
            background: rgba(0, 255, 0, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 0 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-display);
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .btn-add:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.3);
        }

        .task-list {
            list-style: none;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            padding-right: 0.5rem;
        }

        .task-list::-webkit-scrollbar { width: 4px; }
        .task-list::-webkit-scrollbar-track { background: transparent; }
        .task-list::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 4px; }

        .task-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-left: 3px solid var(--neon-cyan);
            border-radius: 4px;
            transition: all 0.3s;
        }

        .task-item:hover {
            border-color: rgba(0, 255, 255, 0.3);
            transform: translateX(4px);
        }

        .task-item.completed {
            border-left-color: var(--neon-green);
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .task-content {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-grow: 1;
        }

        .task-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid var(--neon-cyan);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            outline: none;
            flex-shrink: 0;
            background: transparent;
        }

        .task-item.completed .task-checkbox {
            border-color: var(--neon-green);
            background: rgba(0, 255, 0, 0.2);
        }

        .task-item.completed .task-checkbox::after {
            content: '';
            position: absolute;
            left: 5px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid var(--neon-green);
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .task-text {
            font-size: 1rem;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            transition: color 0.2s;
        }

        .btn-delete:hover {
            color: var(--neon-red);
            text-shadow: 0 0 8px rgba(255, 0, 60, 0.5);
        }

        .priority-high {
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.4);
            border-color: var(--neon-red) !important;
        }
        .priority-high .task-text {
            color: var(--neon-red);
            text-shadow: 0 0 8px rgba(255, 0, 60, 0.5);
        }
        
        .priority-medium {
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.4);
            border-color: #FFFF00 !important;
        }
        .priority-medium .task-text {
            color: #FFFF00;
            text-shadow: 0 0 8px rgba(255, 255, 0, 0.5);
        }

        /* Right Column (Widgets) */
        .widgets-section {
            grid-column: 2 / 3;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Animated Progress Ring */
        .progress-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
        }

        .progress-wrapper {
            position: relative;
            width: 140px;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progress-ring {
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-ring__bg {
            stroke: var(--surface-border);
        }

        .progress-ring__circle {
            stroke: var(--neon-cyan);
            stroke-dasharray: 377; /* 2 * PI * r (60) */
            stroke-dashoffset: 377;
            transition: stroke-dashoffset 1.5s ease-in-out;
            filter: drop-shadow(0 0 6px var(--neon-cyan));
            stroke-linecap: round;
        }

        .progress-text {
            font-family: var(--font-display);
            font-size: 1.8rem;
            color: var(--text-main);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.3);
        }

        /* Focus Timer */
        .timer-display {
            font-family: var(--font-display);
            font-size: 3rem;
            text-align: center;
            margin: 1rem 0;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .timer-controls {
            display: flex;
            gap: 1rem;
        }

        .btn-timer {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            font-family: var(--font-display);
            font-size: 0.9rem;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-start {
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
        }
        .btn-start:hover {
            background: rgba(0, 255, 0, 0.1);
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .btn-stop {
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
        }
        .btn-stop:hover {
            background: rgba(255, 0, 60, 0.1);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.2);
        }

        /* Analytics / Distractions */
        .analytics-body {
            display: flex;
            align-items: flex-end;
            gap: 2rem;
            margin-top: 1.5rem;
            height: 120px;
        }

        .distraction-stats {
            flex: 1;
        }

        .distraction-count {
            font-family: var(--font-display);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .distraction-graph-container {
            width: 40px;
            height: 100px;
            background: var(--surface-border);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255, 0, 60, 0.2);
        }

        .distraction-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%; /* Drops by 10% per distraction */
            background: var(--neon-red);
            box-shadow: 0 0 10px rgba(255, 0, 60, 0.8);
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="app-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar neon-box">
            <div class="calendar-header">
                <button id="prev-month" class="btn-icon">&lt;</button>
                <h3 id="month-year" class="neon-text-cyan"></h3>
                <button id="next-month" class="btn-icon">&gt;</button>
            </div>
            
            <div class="calendar-grid-header">
                <span>SU</span><span>MO</span><span>TU</span><span>WE</span><span>TH</span><span>FR</span><span>SA</span>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Days injected via JS -->
            </div>

            <button id="btn-today" class="btn-block" style="margin-top: 1rem;">Jump to Today</button>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header class="dashboard-header">
                <h1 class="neon-text-cyan">NEXUS DASHBOARD</h1>
                <h2 id="current-date-display" class="neon-text-cyan" style="font-size: 1.2rem;"></h2>
            </header>

            <!-- Task Area -->
            <section class="tasks-section">
                <form id="task-form" class="task-input-wrapper">
                    <input type="text" id="task-input" class="task-input" placeholder="Execute new directive..." autocomplete="off">
                    <select id="task-priority" class="task-input" style="width: auto; cursor: pointer;">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                    <button type="submit" class="btn-add">INITIALIZE</button>
                </form>

                <ul id="task-list" class="task-list">
                    <!-- Tasks injected here -->
                </ul>
            </section>

            <!-- Widgets Area -->
            <section class="widgets-section">
                
                <!-- Animated Progress Ring -->
                <div class="neon-box progress-container">
                    <h3 class="neon-text-cyan" style="font-size: 0.9rem; margin-bottom: 0.5rem;">COMPLETION STATUS</h3>
                    <div class="progress-wrapper">
                        <svg class="progress-ring" width="140" height="140">
                            <!-- Background ring -->
                            <circle class="progress-ring__bg" stroke-width="8" fill="transparent" r="60" cx="70" cy="70"/>
                            <!-- Animated neon ring -->
                            <circle class="progress-ring__circle" id="svg-circle" stroke-width="8" fill="transparent" r="60" cx="70" cy="70"/>
                        </svg>
                        <div class="progress-text" id="progress-text">0%</div>
                    </div>
                </div>

                <!-- Focus Timer -->
                <div class="neon-box">
                    <h3 class="neon-text-cyan" style="font-size: 0.9rem;">FOCUS LINK</h3>
                    <div class="timer-display" id="timer-display">25:00</div>
                    <div class="timer-controls">
                        <input type="number" id="timer-input" class="task-input" value="25" min="1" style="width: 80px; padding: 0.5rem; text-align: center;">
                        <button id="btn-timer-start" class="btn-timer btn-start">START LINK</button>
                        <button id="btn-timer-stop" class="btn-timer btn-stop">SEVER LINK</button>
                    </div>
                </div>

                <!-- Distraction Analytics -->
                <div class="neon-box">
                    <h3 class="neon-text-red" style="font-size: 0.9rem;">FOCUS HEALTH (TAB SWITCHES)</h3>
                    <div class="analytics-body">
                        <div class="distraction-stats">
                            <div class="distraction-count neon-text-red" id="distraction-count">0</div>
                            <p class="neon-text-red" style="font-size: 0.8rem; opacity: 0.8;">DISTRACTIONS DETECTED</p>
                            <p id="distraction-status" class="neon-text-green" style="font-size: 0.9rem; margin-top: 0.5rem; font-family: var(--font-display);">STATUS: PERFECT</p>
                        </div>
                        <div class="distraction-graph-container">
                            <div class="distraction-bar" id="distraction-bar"></div>
                        </div>
                    </div>
                </div>

            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // === STATE ===
            let currentSelectedDate = getFormattedDate(new Date()); // YYYY-MM-DD
            let currentCalendarViewMonth = new Date(); 
            
            let currentData = {
                tasks: [],
                distractions: 0
            };

            // Timer State
            let isTimerRunning = false;
            let timerInterval = null;
            let timeLeft = 25 * 60; // 25 minutes default

            // SVG Circle constants (r=60 -> circumference = 2 * Math.PI * 60)
            const CIRCUMFERENCE = 377; 

            // === DOM ELEMENTS ===
            const calendarGrid = document.getElementById('calendar-grid');
            const monthYearText = document.getElementById('month-year');
            const currentDateDisplay = document.getElementById('current-date-display');
            
            const taskForm = document.getElementById('task-form');
            const taskInput = document.getElementById('task-input');
            const taskList = document.getElementById('task-list');
            
            const svgCircle = document.getElementById('svg-circle');
            const progressText = document.getElementById('progress-text');

            const timerDisplay = document.getElementById('timer-display');
            const btnTimerStart = document.getElementById('btn-timer-start');
            const btnTimerStop = document.getElementById('btn-timer-stop');

            const distractionCountText = document.getElementById('distraction-count');
            const distractionBar = document.getElementById('distraction-bar');

            // === INITIALIZE ===
            init();

            function init() {
                // Prepare SVG
                svgCircle.style.strokeDasharray = CIRCUMFERENCE;
                svgCircle.style.strokeDashoffset = CIRCUMFERENCE;

                renderCalendar();
                loadDataForDate(currentSelectedDate);
                updateTimerDisplay();
            }

            // === STORAGE LOGIC ===
            function loadDataForDate(dateStr) {
                const dateObj = new Date(dateStr + "T00:00:00");
                currentDateDisplay.textContent = dateObj.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' }).toUpperCase();

                const storageKey = `omu_data_${dateStr}`;
                const stored = localStorage.getItem(storageKey);
                
                if (stored) {
                    currentData = JSON.parse(stored);
                } else {
                    currentData = { tasks: [], distractions: 0 };
                }

                // Make sure distractions is initialized if old structure existed
                if(currentData.distractions === undefined) currentData.distractions = 0;

                renderTasks();
                updateProgress();
                updateDistractionUI();
            }

            function saveData() {
                const storageKey = `omu_data_${currentSelectedDate}`;
                localStorage.setItem(storageKey, JSON.stringify(currentData));
            }

            // === CALENDAR LOGIC ===
            function getFormattedDate(dateObj) {
                const y = dateObj.getFullYear();
                const m = String(dateObj.getMonth() + 1).padStart(2, '0');
                const d = String(dateObj.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}`;
            }

            function renderCalendar() {
                const year = currentCalendarViewMonth.getFullYear();
                const month = currentCalendarViewMonth.getMonth();
                const monthNames = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
                monthYearText.textContent = `${monthNames[month]} ${year}`;

                calendarGrid.innerHTML = '';
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const todayStr = getFormattedDate(new Date());

                for (let i = 0; i < firstDay; i++) {
                    const d = document.createElement('div');
                    d.className = 'calendar-day empty';
                    calendarGrid.appendChild(d);
                }

                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = getFormattedDate(new Date(year, month, day));
                    const d = document.createElement('div');
                    d.className = 'calendar-day';
                    d.textContent = day;
                    
                    if (dateStr === todayStr) d.classList.add('today');
                    if (dateStr === currentSelectedDate) d.classList.add('selected');

                    d.addEventListener('click', () => {
                        currentSelectedDate = dateStr;
                        renderCalendar(); 
                        loadDataForDate(currentSelectedDate);
                    });

                    calendarGrid.appendChild(d);
                }
            }

            document.getElementById('prev-month').addEventListener('click', () => {
                currentCalendarViewMonth.setMonth(currentCalendarViewMonth.getMonth() - 1);
                renderCalendar();
            });

            document.getElementById('next-month').addEventListener('click', () => {
                currentCalendarViewMonth.setMonth(currentCalendarViewMonth.getMonth() + 1);
                renderCalendar();
            });

            document.getElementById('btn-today').addEventListener('click', () => {
                const today = new Date();
                currentCalendarViewMonth = new Date(today.getFullYear(), today.getMonth(), 1);
                currentSelectedDate = getFormattedDate(today);
                renderCalendar();
                loadDataForDate(currentSelectedDate);
            });

            // === TASK LOGIC ===
            taskForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = taskInput.value.trim();
                if (!text) return;

                const priority = document.getElementById('task-priority').value;

                currentData.tasks.unshift({
                    id: Date.now().toString(),
                    text: text,
                    completed: false,
                    priority: priority
                });

                // Sort tasks by priority so High is at the top
                currentData.tasks.sort((a, b) => {
                    const pValues = { 'High': 3, 'Medium': 2, 'Low': 1 };
                    const pA = pValues[a.priority || 'Low'];
                    const pB = pValues[b.priority || 'Low'];
                    return pB - pA;
                });

                taskInput.value = '';
                saveData();
                renderTasks();
                updateProgress();
            });

            function toggleTask(id) {
                currentData.tasks = currentData.tasks.map(t => t.id === id ? { ...t, completed: !t.completed } : t);
                saveData();
                renderTasks();
                updateProgress();
            }

            function deleteTask(id) {
                currentData.tasks = currentData.tasks.filter(t => t.id !== id);
                saveData();
                renderTasks();
                updateProgress();
            }

            function renderTasks() {
                taskList.innerHTML = '';
                if (currentData.tasks.length === 0) {
                    taskList.innerHTML = `<li class="empty-state">No directives found.</li>`;
                    return;
                }

                currentData.tasks.forEach(task => {
                    const li = document.createElement('li');
                    let priorityClass = '';
                    if (task.priority === 'High') priorityClass = 'priority-high';
                    if (task.priority === 'Medium') priorityClass = 'priority-medium';
                    li.className = `task-item ${priorityClass} ${task.completed ? 'completed' : ''}`;
                    
                    li.innerHTML = `
                        <div class="task-content">
                            <input type="checkbox" class="task-checkbox" ${task.completed ? 'checked' : ''}>
                            <span class="task-text">${escapeHTML(task.text)}</span>
                        </div>
                        <button class="btn-delete" title="Purge Directive">×</button>
                    `;

                    li.querySelector('.task-checkbox').addEventListener('change', () => toggleTask(task.id));
                    li.querySelector('.btn-delete').addEventListener('click', () => deleteTask(task.id));
                    
                    taskList.appendChild(li);
                });
            }

            // === SVG PROGRESS LOGIC ===
            function updateProgress() {
                const total = currentData.tasks.length;
                const completed = currentData.tasks.filter(t => t.completed).length;
                let percent = 0;
                
                if (total > 0) {
                    percent = Math.round((completed / total) * 100);
                }

                progressText.textContent = `${percent}%`;
                
                // Calculate stroke offset
                const offset = CIRCUMFERENCE - (percent / 100) * CIRCUMFERENCE;
                
                // Allow a tiny delay so the DOM captures the transition smoothly
                requestAnimationFrame(() => {
                    svgCircle.style.strokeDashoffset = offset;
                });
            }

            // === FOCUS TIMER & DISTRACTION TRACKING ===
            
            function updateTimerDisplay() {
                const m = String(Math.floor(timeLeft / 60)).padStart(2, '0');
                const s = String(timeLeft % 60).padStart(2, '0');
                timerDisplay.textContent = `${m}:${s}`;
                
                if (isTimerRunning) {
                    timerDisplay.style.textShadow = "0 0 15px rgba(0, 255, 0, 0.6)";
                    timerDisplay.style.color = "var(--neon-green)";
                } else {
                    timerDisplay.style.textShadow = "0 0 10px rgba(0, 255, 255, 0.3)";
                    timerDisplay.style.color = "var(--text-main)";
                }
            }

            btnTimerStart.addEventListener('click', () => {
                if (isTimerRunning) {
                    // PAUSE the timer
                    isTimerRunning = false;
                    clearInterval(timerInterval);
                    btnTimerStart.textContent = 'START LINK';
                    updateTimerDisplay();
                    return;
                }
                
                // START the timer
                isTimerRunning = true;
                btnTimerStart.textContent = 'PAUSE LINK';
                
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateTimerDisplay();
                    } else {
                        // Timer finished
                        stopTimer();
                        alert("FOCUS LINK COMPLETED.");
                        let resetMins = parseInt(document.getElementById('timer-input').value, 10);
                        if (isNaN(resetMins) || resetMins < 1) resetMins = 25;
                        timeLeft = resetMins * 60;
                        updateTimerDisplay();
                    }
                }, 1000);
                updateTimerDisplay();
            });

            btnTimerStop.addEventListener('click', () => {
                stopTimer();
                let mins = parseInt(document.getElementById('timer-input').value, 10);
                if (isNaN(mins) || mins < 1) mins = 25;
                timeLeft = mins * 60; // reset
                updateTimerDisplay();
            });

            document.getElementById('timer-input').addEventListener('input', (e) => {
                if (!isTimerRunning) {
                    let mins = parseInt(e.target.value, 10);
                    if (isNaN(mins) || mins < 1) mins = 25;
                    timeLeft = mins * 60;
                    updateTimerDisplay();
                }
            });

            function stopTimer() {
                isTimerRunning = false;
                clearInterval(timerInterval);
                btnTimerStart.textContent = 'START LINK';
                updateTimerDisplay();
            }

            // Core Page Visibility Logic for Distractions
            document.addEventListener('visibilitychange', () => {
                // If timer is running and the user navigates away (switches tabs, minimizes)
                if (document.visibilityState === 'hidden' && isTimerRunning === true) {
                    currentData.distractions++;
                    saveData();
                    updateDistractionUI();
                }
            });

            function updateDistractionUI() {
                distractionCountText.textContent = currentData.distractions;
                
                // 10% penalty per distraction. Start at 100%. Floor at 0%.
                let heightPercent = 100 - (currentData.distractions * 10);
                if (heightPercent < 0) heightPercent = 0;
                
                distractionBar.style.height = `${heightPercent}%`;

                const statusText = document.getElementById('distraction-status');
                if (statusText) {
                    if (currentData.distractions === 0) {
                        statusText.textContent = "STATUS: PERFECT";
                        statusText.className = "neon-text-green";
                    } else if (currentData.distractions < 4) {
                        statusText.textContent = "STATUS: GOOD";
                        statusText.className = "neon-text-cyan";
                    } else if (currentData.distractions < 8) {
                        statusText.textContent = "STATUS: WARNING";
                        statusText.className = "neon-text-red";
                    } else {
                        statusText.textContent = "STATUS: CRITICAL";
                        statusText.className = "neon-text-red";
                    }
                }

                // If health hits 0, make it pulse critically
                if (heightPercent === 0) {
                    distractionBar.style.animation = "pulse 1s infinite alternate";
                } else {
                    distractionBar.style.animation = "none";
                }
            }

            // Utilities
            function escapeHTML(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }
        });
    </script>
</body>
</html>
